[pytest]
# Pytest 核心配置文件

# ============= 测试文件位置 =============
testpaths = test_cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ============= 日志配置 =============
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ============= 默认执行选项 =============
addopts = 
    -v
    --strict-markers
    --disable-warnings
    --alluredir=reports/allure_results
    -ra
    --tb=short
    # --cov=api
    # --cov=common
    # --cov=page_objects
    # --cov=config
    # --cov-report=html:reports/coverage/html
    # --cov-report=term-missing
    # --cov-report=xml:reports/coverage/coverage.xml
    # --cov-fail-under=80

# ============= 标记定义（Markers） =============
# 用于分类和条件执行测试
markers =
    api: API 自动化测试
    ui: UI 自动化测试
    smoke: 烟雾测试（快速）
    regression: 回归测试（全面）
    web: Web UI 测试
    slow: 慢速测试
    fast: 快速测试
    critical: 关键路径测试
    sanity: 健全性测试
    smoke_plus: 加强型烟雾测试
    boundary: 边界值测试
    exception: 异常场景测试
    security: 安全性测试
    performance: 性能测试
    integration: 集成测试
    unit: 单元测试
    p0: 优先级最高
    p1: 优先级高
    p2: 优先级中
    p3: 优先级低

# ============= 超时配置 =============
timeout = 300
timeout_method = thread

# ============= 其他配置 =============
# 显示本地变量
showlocals = true
# 在失败的第一个地方停止
# -x

# ============= 运行配置 =============
# 最小覆盖率（可选）
# --cov=.
# --cov-report=html

