[pytest]
testpaths = test_cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

addopts = -v --tb=short --disable-warnings

markers =
    api: API 自动化测试
    ui: UI 自动化测试
    smoke: 烟雾测试
    regression: 回归测试
    web: Web UI 测试
    slow: 慢速测试
    fast: 快速测试
    critical: 关键路径测试
    boundary: 边界值测试
    security: 安全性测试
    performance: 性能测试
    integration: 集成测试

filterwarnings =
    ignore::DeprecationWarning
