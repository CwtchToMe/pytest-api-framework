# 异常测试数据
# 用于测试各种异常场景和安全测试

# SQL 注入测试数据
sql_injection:
  payloads:
    - value: "'; DROP TABLE users; --"
      description: "DROP TABLE 注入"
      
    - value: "' OR '1'='1"
      description: "OR 条件注入"
      
    - value: "admin'--"
      description: "注释注入"
      
    - value: "' UNION SELECT * FROM users --"
      description: "UNION 注入"

# XSS 攻击测试数据
xss_attack:
  payloads:
    - value: "<script>alert('xss')</script>"
      description: "script 标签注入"
      
    - value: "<img src=x onerror=alert('xss')>"
      description: "img 标签注入"
      
    - value: "javascript:alert('xss')"
      description: "javascript 协议注入"
      
    - value: "<svg onload=alert('xss')>"
      description: "svg 标签注入"

# 无效邮箱格式
invalid_email:
  formats:
    - value: ""
      description: "空邮箱"
      
    - value: "test"
      description: "缺少 @ 符号"
      
    - value: "test@"
      description: "缺少域名"
      
    - value: "@test.com"
      description: "缺少用户名"
      
    - value: "test@test"
      description: "缺少顶级域名"
      
    - value: "test..user@test.com"
      description: "连续点号"
      
    - value: "test@test..com"
      description: "域名连续点号"

# 特殊字符测试
special_characters:
  cases:
    - value: "test user"
      description: "包含空格"
      
    - value: "test\tuser"
      description: "包含制表符"
      
    - value: "test\nuser"
      description: "包含换行符"
      
    - value: "test\u0000user"
      description: "包含空字符"
      
    - value: "测试用户"
      description: "中文字符"
      
    - value: "test🎉"
      description: "emoji 表情"

# 类型错误测试
type_errors:
  cases:
    - value_type: "int"
      value: 12345
      description: "数字类型用户名"
      
    - value_type: "None"
      value: null
      description: "None 用户名"
      
    - value_type: "bool"
      value: true
      description: "布尔类型用户名"
      
    - value_type: "list"
      value: []
      description: "列表类型用户名"
      
    - value_type: "dict"
      value: {}
      description: "字典类型用户名"

# HTTP 错误响应
error_responses:
  - status_code: 400
    message: "Bad Request"
    description: "请求格式错误"
    
  - status_code: 401
    message: "Bad credentials"
    description: "认证失败"
    
  - status_code: 403
    message: "API rate limit exceeded"
    description: "权限不足或频率限制"
    
  - status_code: 404
    message: "Not Found"
    description: "资源不存在"
    
  - status_code: 422
    message: "Validation Failed"
    description: "参数验证失败"
    
  - status_code: 500
    message: "Internal Server Error"
    description: "服务器内部错误"
